<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Packing List</title>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #efefeb;
    --border: #dddbd4;
    --text: #1a1a18;
    --text2: #6b6a65;
    --text3: #9e9d98;
    --accent: #2563eb;
    --accent-bg: #eff6ff;
    --accent-border: #bfdbfe;
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --green-border: #bbf7d0;
    --radius: 8px;
    --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 1.5rem 1rem;
    margin: 0 auto;
  }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 1.5rem; }
  .person-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  button.tab {
    padding: 6px 16px; font-size: 14px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text2); cursor: pointer; font-family: inherit; transition: all 0.1s;
  }
  button.tab:hover { border-color: #aaa; color: var(--text); }
  button.tab.active {
    border: 1.5px solid var(--accent-border); background: var(--accent-bg);
    color: var(--accent); font-weight: 600;
  }

  /* 3-column layout for regular people */
  .columns-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 2rem;
  }
  /* 1-column layout for Car */
  .columns-1 {
    display: grid;
    grid-template-columns: minmax(0, 480px);
    gap: 16px;
    margin-bottom: 2rem;
  }
  @media (max-width: 700px) {
    .columns-3, .columns-1 { grid-template-columns: 1fr; }
  }

  .column {
    background: var(--surface2); border-radius: var(--radius-lg);
    padding: 1rem; min-height: 400px; display: flex; flex-direction: column;
  }
  .column-title { font-size: 15px; font-weight: 600; margin-bottom: 0.5rem; color: var(--text); }
  .column-progress { font-size: 12px; color: var(--text3); margin-bottom: 1rem; }
  .column-body { flex: 1; }
  .column-body.drag-over { background: #e0f2fe; border-radius: var(--radius); }

  .pack-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 10px; margin-bottom: 5px;
    cursor: move; display: flex; align-items: center; gap: 6px;
    user-select: none; transition: opacity 0.15s, box-shadow 0.1s;
  }
  .pack-item:hover { box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .pack-item.dragging { opacity: 0.4; }
  .pack-item.done { opacity: 0.45; }
  .pack-check {
    width: 17px; height: 17px; border-radius: 50%; border: 1.5px solid #ccc;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; cursor: pointer; background: #fff; transition: all 0.1s;
  }
  .pack-item.done .pack-check { background: var(--green-bg); border-color: var(--green-border); }
  .pack-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: none; }
  .pack-item.done .pack-dot { display: block; }
  .pack-label {
    font-size: 13px; color: var(--text); flex: 1; cursor: pointer;
    min-width: 0; word-break: break-word;
  }
  .pack-item.done .pack-label { text-decoration: line-through; color: var(--text3); }
  .pack-label input {
    font-size: 13px; padding: 3px 6px; border: 1px solid #ccc;
    border-radius: var(--radius); width: 100%; font-family: inherit;
  }
  .qty-select {
    font-size: 12px; padding: 2px; border: 1px solid var(--border);
    border-radius: var(--radius); background: var(--surface2); color: var(--text);
    width: 46px; flex-shrink: 0; cursor: pointer; font-family: inherit;
  }
  .edit-btn, .remove-btn {
    font-size: 12px; background: none; border: none; cursor: pointer;
    padding: 2px 4px; color: var(--text3); flex-shrink: 0; font-family: inherit;
  }
  .edit-btn:hover { color: var(--accent); }
  .remove-btn:hover { color: #dc2626; }
  .empty-hint { font-size: 13px; color: var(--text3); text-align: center; padding: 2rem 0; }

  .add-section { border-top: 1px solid var(--border); padding-top: 1rem; }
  .add-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--text2); margin-bottom: 8px;
  }
  .add-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .add-row input, .add-row select {
    padding: 7px 10px; font-size: 14px; border: 1px solid var(--border);
    border-radius: var(--radius); background: var(--surface);
    font-family: inherit; color: var(--text);
  }
  .add-row input { flex: 1; min-width: 140px; }
  .add-row select { min-width: 110px; }
  .add-row button {
    padding: 7px 16px; font-size: 14px; background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius); cursor: pointer;
    font-family: inherit; font-weight: 500;
  }
  .add-row button:hover { background: #1d4ed8; }
</style>
</head>
<body>

<h1>Packing List</h1>
<div class="person-tabs" id="person-tabs"></div>
<div id="columns-wrap"></div>

<div class="add-section">
  <div class="add-label">Add item</div>
  <div class="add-row">
    <input type="text" id="new-item-input" placeholder="Item name..." onkeydown="if(event.key==='Enter')addItem()" />
    <select id="new-item-cat">
      <option value="clothing">Clothing</option>
      <option value="toiletries">Toiletries</option>
      <option value="documents">Documents</option>
      <option value="electronics">Electronics</option>
      <option value="medications">Medications</option>
      <option value="misc">Misc</option>
    </select>
    <select id="new-item-trip" style="display:none;">
      <option value="roadtripbag">Road Trip Bag</option>
      <option value="oregonbag">Oregon Bag</option>
      <option value="trip">Trip</option>
    </select>
    <button onclick="addItem()">+ Add</button>
  </div>
</div>

<script>
const CAT_ORDER = ['clothing','toiletries','documents','electronics','medications','misc'];
const PEOPLE = ['alaina','jamie','lincoln','household'];
const PERSON_LABELS = {alaina:'Alaina', jamie:'Jamie', lincoln:'Lincoln', household:'Car'};
const TRIPS = ['roadtripbag','oregonbag','trip'];
const TRIP_LABELS = {roadtripbag:'Road Trip Bag', oregonbag:'Oregon Bag', trip:'Trip'};
const STORAGE_KEY = 'packing_v2';

const DEFAULT_LISTS = {
  alaina: {
    clothing: ['Underwear x7','Socks x7','Pants x3','Shirts x5','Pajamas','Jacket/hoodie','Shoes (travel)','Shoes (casual)','Bra x3'],
    toiletries: ['Toothbrush + toothpaste','Deodorant','Shampoo + conditioner','Body wash','Razor','Hair ties/brush','Skincare','Feminine hygiene items'],
    documents: ['ID/license','Insurance cards','Phone + charger','Wallet/cash'],
    electronics: ['Laptop + charger','Earbuds/headphones','Portable charger'],
    medications: ['Daily medications','Pain reliever'],
    misc: ['Reusable bag','Snacks for travel','Water bottle']
  },
  jamie: {
    clothing: ['Underwear x7','Socks x7','Pants x3','Shirts x5','Pajamas','Jacket/hoodie','Shoes (travel)','Shoes (casual)'],
    toiletries: ['Toothbrush + toothpaste','Deodorant','Shampoo + conditioner','Body wash','Razor','Hair ties/brush','Skincare'],
    documents: ['ID/license','Insurance cards','Phone + charger','Wallet/cash'],
    electronics: ['Earbuds/headphones','Portable charger'],
    medications: ['Daily medications'],
    misc: ['Reusable bag','Water bottle']
  },
  lincoln: {
    clothing: ['Underwear x7','Socks x7','Pants x3','Shirts x5','Pajamas','Jacket/hoodie','Shoes (travel)','Shoes (casual)','Comfort outfit'],
    toiletries: ['Toothbrush + toothpaste','Shampoo/body wash','Hairbrush','Sunscreen'],
    documents: ['Insurance card','Any school/IEP docs'],
    electronics: ['Tablet + charger','Headphones'],
    medications: ['Daily medications','Any PRN/as-needed meds'],
    misc: ['Comfort item/stuffed animal','Fidget/sensory toy','Snacks (safe foods)','Water bottle','Activity book or coloring']
  },
  household: {
    clothing: [], toiletries: [], medications: [],
    documents: ['Car registration/insurance','AAA card (if member)'],
    electronics: ['Car phone charger','Flashlight + batteries'],
    misc: ['First aid kit','Tissues/paper towels','Trash bags','Hand sanitizer','Wet wipes','Cooler + ice packs','Snacks for car','Cash for tolls']
  }
};

let activePerson = 'alaina';
let draggedItem = null;

function getState() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; } }
function saveState(s) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {} }

function getLists() {
  const s = getState();
  if (!s._lists) {
    const lists = {};
    PEOPLE.forEach(p => {
      lists[p] = {};
      const def = DEFAULT_LISTS[p] || {};
      TRIPS.forEach(t => { lists[p][t] = {}; CAT_ORDER.forEach(c => { lists[p][t][c] = def[c] ? [...def[c]] : []; }); });
    });
    s._lists = lists; saveState(s); return lists;
  }
  PEOPLE.forEach(p => {
    if (!s._lists[p]) s._lists[p] = {};
    TRIPS.forEach(t => {
      if (!s._lists[p][t]) s._lists[p][t] = {};
      CAT_ORDER.forEach(c => { if (!s._lists[p][t][c]) s._lists[p][t][c] = []; });
    });
  });
  return s._lists;
}
function saveLists(l) { const s = getState(); s._lists = l; saveState(s); }
function getChecked() { const s = getState(); return s._checked || {}; }
function saveChecked(c) { const s = getState(); s._checked = c; saveState(s); }
function getQtys() { const s = getState(); return s._qtys || {}; }
function saveQtys(q) { const s = getState(); s._qtys = q; saveState(s); }

function iKey(p,t,c,l) { return p+'|'+t+'|'+c+'|'+l; }
function qKey(p,t,c,l) { return 'q|'+p+'|'+t+'|'+c+'|'+l; }

function toggleItem(p,t,c,l) {
  const ch = getChecked(); ch[iKey(p,t,c,l)] = !ch[iKey(p,t,c,l)]; saveChecked(ch); render();
}
function setQty(p,t,c,l,v) { const q = getQtys(); q[qKey(p,t,c,l)] = v; saveQtys(q); }
function removeItem(p,t,c,l) {
  const lists = getLists(); lists[p][t][c] = lists[p][t][c].filter(i => i !== l);
  saveLists(lists); render();
}
function editItem(p,t,c,oldL,inp) {
  const newL = inp.value.trim(); if (!newL) { render(); return; }
  const lists = getLists(); const idx = lists[p][t][c].indexOf(oldL);
  if (idx >= 0) {
    lists[p][t][c][idx] = newL;
    const ch = getChecked(); const q = getQtys();
    const ok = iKey(p,t,c,oldL); const nk = iKey(p,t,c,newL);
    const oq = qKey(p,t,c,oldL); const nq = qKey(p,t,c,newL);
    if (ch[ok]) { ch[nk] = true; delete ch[ok]; saveChecked(ch); }
    if (q[oq]) { q[nq] = q[oq]; delete q[oq]; saveQtys(q); }
    saveLists(lists);
  }
  render();
}

function addItem() {
  const input = document.getElementById('new-item-input');
  const cat = document.getElementById('new-item-cat').value;
  const label = input.value.trim(); if (!label) return;
  const lists = getLists();
  const isCar = activePerson === 'household';
  const trip = isCar ? 'roadtripbag' : document.getElementById('new-item-trip').value;
  if (!lists[activePerson][trip][cat].includes(label)) lists[activePerson][trip][cat].push(label);
  saveLists(lists); input.value = ''; render();
}

function switchPerson(p) {
  activePerson = p;
  document.querySelectorAll('#person-tabs button').forEach(b =>
    b.classList.toggle('active', b.dataset.key === p));
  // show/hide trip selector in add form
  document.getElementById('new-item-trip').style.display = (p === 'household') ? 'none' : '';
  render();
}

function makeItem(p, t, cat, label) {
  const checked = getChecked(); const qtys = getQtys();
  const isDone = !!checked[iKey(p,t,cat,label)];
  const qv = qtys[qKey(p,t,cat,label)] || '1';

  const div = document.createElement('div');
  div.className = 'pack-item' + (isDone ? ' done' : '');
  div.draggable = activePerson !== 'household';

  const chk = document.createElement('div'); chk.className = 'pack-check';
  const dot = document.createElement('div'); dot.className = 'pack-dot';
  chk.appendChild(dot);
  chk.onclick = (e) => { e.stopPropagation(); toggleItem(p,t,cat,label); };

  const lbl = document.createElement('span'); lbl.className = 'pack-label';
  lbl.textContent = label;
  lbl.onclick = (e) => { e.stopPropagation(); toggleItem(p,t,cat,label); };

  const sel = document.createElement('select'); sel.className = 'qty-select';
  for (let i = 1; i <= 20; i++) {
    const o = document.createElement('option'); o.value = i; o.textContent = 'x'+i;
    if (String(i) === String(qv)) o.selected = true; sel.appendChild(o);
  }
  sel.onchange = (e) => { e.stopPropagation(); setQty(p,t,cat,label,sel.value); };
  sel.onclick = (e) => e.stopPropagation();

  const editBtn = document.createElement('button'); editBtn.className = 'edit-btn'; editBtn.textContent = 'edit';
  editBtn.onclick = (e) => {
    e.stopPropagation(); lbl.innerHTML = '';
    const inp = document.createElement('input'); inp.type = 'text'; inp.value = label;
    lbl.appendChild(inp); inp.focus(); inp.select();
    inp.onblur = () => editItem(p,t,cat,label,inp);
    inp.onkeydown = (ev) => {
      if (ev.key === 'Enter') editItem(p,t,cat,label,inp);
      if (ev.key === 'Escape') render();
      ev.stopPropagation();
    };
    inp.onclick = (e) => e.stopPropagation();
  };

  const rmBtn = document.createElement('button'); rmBtn.className = 'remove-btn'; rmBtn.textContent = 'x';
  rmBtn.onclick = (e) => { e.stopPropagation(); removeItem(p,t,cat,label); };

  if (activePerson !== 'household') {
    div.addEventListener('dragstart', (e) => {
      draggedItem = {trip:t, cat, label};
      div.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move';
    });
    div.addEventListener('dragend', () => div.classList.remove('dragging'));
  }

  div.appendChild(chk); div.appendChild(lbl); div.appendChild(sel);
  div.appendChild(editBtn); div.appendChild(rmBtn);
  return div;
}

function makeColumn(p, trip, titleText) {
  const lists = getLists(); const checked = getChecked();
  const col = document.createElement('div'); col.className = 'column';

  const title = document.createElement('div'); title.className = 'column-title';
  title.textContent = titleText; col.appendChild(title);

  const allItems = [];
  CAT_ORDER.forEach(cat => { (lists[p][trip][cat]||[]).forEach(label => allItems.push({cat,label})); });
  const doneCount = allItems.filter(({cat,label}) => checked[iKey(p,trip,cat,label)]).length;

  const prog = document.createElement('div'); prog.className = 'column-progress';
  prog.textContent = doneCount + ' / ' + allItems.length + ' packed'; col.appendChild(prog);

  const body = document.createElement('div'); body.className = 'column-body';

  if (!allItems.length) {
    body.innerHTML = '<div class="empty-hint">Empty</div>';
  } else {
    allItems.forEach(({cat,label}) => body.appendChild(makeItem(p, trip, cat, label)));
  }

  if (p !== 'household') {
    body.addEventListener('dragover', (e) => { e.preventDefault(); body.classList.add('drag-over'); });
    body.addEventListener('dragleave', () => body.classList.remove('drag-over'));
    body.addEventListener('drop', (e) => {
      e.preventDefault(); body.classList.remove('drag-over');
      if (!draggedItem) return;
      const {trip: fromTrip, cat, label} = draggedItem;
      if (fromTrip === trip) return;
      const lists = getLists();
      if (!lists[p][trip][cat]) lists[p][trip][cat] = [];
      if (!lists[p][trip][cat].includes(label)) {
        lists[p][trip][cat].push(label);
        lists[p][fromTrip][cat] = lists[p][fromTrip][cat].filter(i => i !== label);
        saveLists(lists); render();
      }
    });
  }

  col.appendChild(body);
  return col;
}

function render() {
  const wrap = document.getElementById('columns-wrap');
  wrap.innerHTML = '';
  const p = activePerson;
  const isCar = p === 'household';

  const grid = document.createElement('div');
  grid.className = isCar ? 'columns-1' : 'columns-3';

  if (isCar) {
    // Single combined column for Car — merge all 3 trips into one flat list
    const col = document.createElement('div'); col.className = 'column';
    const title = document.createElement('div'); title.className = 'column-title';
    title.textContent = 'Car'; col.appendChild(title);

    const lists = getLists(); const checked = getChecked();
    const allItems = [];
    CAT_ORDER.forEach(cat => {
      // use roadtripbag as the single store for Car
      (lists[p]['roadtripbag'][cat]||[]).forEach(label => allItems.push({cat,label}));
    });
    const doneCount = allItems.filter(({cat,label}) => checked[iKey(p,'roadtripbag',cat,label)]).length;
    const prog = document.createElement('div'); prog.className = 'column-progress';
    prog.textContent = doneCount + ' / ' + allItems.length + ' packed'; col.appendChild(prog);

    const body = document.createElement('div'); body.className = 'column-body';
    if (!allItems.length) {
      body.innerHTML = '<div class="empty-hint">Empty — add items below</div>';
    } else {
      allItems.forEach(({cat,label}) => body.appendChild(makeItem(p,'roadtripbag',cat,label)));
    }
    col.appendChild(body);
    grid.appendChild(col);
  } else {
    TRIPS.forEach(t => grid.appendChild(makeColumn(p, t, TRIP_LABELS[t])));
  }

  wrap.appendChild(grid);
}

function renderTabs() {
  const pt = document.getElementById('person-tabs');
  PEOPLE.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (p === activePerson ? ' active' : '');
    btn.textContent = PERSON_LABELS[p]; btn.dataset.key = p;
    btn.onclick = () => switchPerson(p); pt.appendChild(btn);
  });
}

renderTabs();
render();
</script>
</body>
</html>
